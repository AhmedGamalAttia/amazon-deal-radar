name: Scrape Amazon Deals

on:
  schedule:
    # Every hour at minute 17 (avoid the top-of-hour traffic spike)
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py
        continue-on-error: false

      - name: Commit updated data
        run: |
          git config user.name  "deal-radar-bot"
          git config user.email "deal-radar-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts="$(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "data: refresh deals @ $ts"
          git push
